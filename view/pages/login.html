<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="brand-favicon" rel="icon" type="image/png" href="../img/logo-visual.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="stylesheet" type="text/css" href="../css/pages/login.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Finalizaê — Autenticação</title>

</head>

<body id="tela_Login">

    <div class="login-container">
        <div class="login-logo">
            <img src="../img/logo-visual.png" alt="Logo">
            <img src="../img/logo.svg" alt="Finalizaê" class="logo-text">
        </div>

        <div class="admin-card">
            <div class="admin-card-header" style="margin-bottom: 24px; text-align: center;">
                <h1 class="admin-title">Acessar o Sistema</h1>
                <p class="admin-subtitle">Insira suas credenciais para continuar.</p>
            </div>

            <div class="admin-error" id="loginError" style="display:none; margin-bottom: 20px;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="loginErrorMsg">Usuário ou senha incorretos.</span>
            </div>

            <form id="formLogin" novalidate>
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    
                    <div class="form-group">
                        <label for="fIdentity">Usuário de autenticação <span class="req">*</span></label>
                        <input type="text" id="fIdentity" name="identity" 
                               placeholder="ex: adm-xyz" required>
                    </div>

                    <div class="form-group">
                        <label for="fSenha">Senha <span class="req">*</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="fSenha" name="password" 
                                   placeholder="••••••••" required style="padding-right: 42px;">
                            <i class="fa-regular fa-eye-slash" id="togglePassword"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="btnEntrar" style="margin-top: 8px;">
                        <i class="fa-solid fa-right-to-bracket"></i> Entrar
                    </button>
                </div>
                                    <p class="texto-suporte"> se tiver problemas com login por favor contate o suporte </p>


            </form>

            <div class="form-footer">
                <a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Voltar à página inicial</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <script src="../javascript/features/api_config.js"></script>
    <script src="../javascript/features/login.js"></script>
</body>
</html>
