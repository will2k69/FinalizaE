<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../img/logo-visual.png">
    <link rel="stylesheet" type="text/css" href="../css/global/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Finalizaê - Explorar Planejamento</title>
</head>
<body id="tela_ExplorarPlanejamento">
    <header class="main-header">
        <div class="top-bar">
            <div class="logo">
                <a href="tela_inicial.html"><img src="../img/logo-visual.png" alt="logo visual"></a>
            </div>
            <div class="logo-text">
                <a href="tela_inicial.html"><img src="../img/logo.svg" alt="logo tipografico escrito Finalizaê"></a>
            </div>
        </div>
    </header>

    <main class="explorer-wrapper">
        <h1 class="title">Explorar PPC - Estrutura Curricular</h1>
        <p class="subtitle">Navegue pela estrutura curricular completa dos cursos.</p>
        <p id="ppcNote" class="ppc-note"></p>
        

        <section class="filters" aria-label="Filtros da estrutura curricular">
            <label class="input-wrap" for="searchInput">
                <span>🔎</span>
                <input id="searchInput" type="search" placeholder="Buscar disciplinas, código ou pré-requisito">
            </label>

            <label for="courseSelect" class="sr-only">Curso</label>
            <select id="courseSelect" aria-label="Selecionar curso"></select>

            <label for="periodFilter" class="sr-only">Período</label>
            <select id="periodFilter" aria-label="Filtrar por período"></select>
        </section>

        <div class="summary-row">
            <p id="summaryText" class="summary"></p>
            <div class="summary-actions">
                <a href="tela_inicial.html" class="btn-back-header">
                    <i class="fa-solid fa-arrow-left"></i> Voltar
                </a>
                <button id="exportPdfBtn" class="export-btn" type="button">⬇ Exportar PDF</button>
            </div>
        </div>

        <section id="periodsContainer" class="periods" aria-live="polite"></section>
    </main>

    <script src="../javascript/features/ppc_data.js"></script>
    <script src="../javascript/pages/tela_explorar_planejamento.js"></script>
    <script src="../javascript/features/scroll_to_top.js"></script>
</body>
</html>
